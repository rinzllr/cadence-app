<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <!-- Dark background, iOS/Android rounded square -->
  <rect width="100" height="100" rx="22" fill="#111111"/>

  <!-- Back arc: teal, lower trajectory, thinner — the trail -->
  <path
    d="M 16,80 C 20,62 42,44 82,34"
    fill="none"
    stroke="#1DB8A0"
    stroke-width="6.5"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Front arc: white, higher trajectory, bolder — the leading edge -->
  <path
    d="M 16,74 C 22,52 46,28 82,18"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="8.5"
    stroke-linecap="round"
  />

  <!-- Teal anchor dot at peak -->
  <circle cx="82" cy="18" r="8" fill="#1DB8A0"/>
</svg>
